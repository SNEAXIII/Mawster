name: CI Pipeline

on:
  push:
    branches:
      - main
      - release
  pull_request:
    branches:
      - main
      - release
permissions:
  contents: read
env:
  WORKDIR: ./api
  PYTHON_VERSION: ${{ vars.PYTHON_VERSION }}
jobs:
  lint-test-python:
    name: Lint & Test for bakend
    runs-on: ubuntu-latest
    needs: trivy
    env:
      MODE: dev
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          enable-cache: true
      - name: Install dev dependencies
        working-directory: ${{ env.WORKDIR }}
        run: uv sync --extra dev
      - name: Run Ruff linter
        uses: astral-sh/ruff-action@v3
        with:
          src: ${{ env.WORKDIR }}
      - name: Run unit tests
        working-directory: ${{ env.WORKDIR }}
        run: uv run pytest tests/unit -v --tb=short
      - name: Run integration tests
        working-directory: ${{ env.WORKDIR }}
        run: uv run pytest tests/integration -v --tb=short -n auto

  e2e-plan:
    name: E2E — Plan spec distribution
    runs-on: ubuntu-latest
    needs: lint-test-python
    outputs:
      matrix: ${{ steps.plan.outputs.matrix }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Compute spec distribution
        id: plan
        run: echo "matrix=$(python3 scripts/e2e_parallel.py --plan --runners 4)" >> $GITHUB_OUTPUT

  e2e-build:
    name: E2E — Build frontend & API
    runs-on: ubuntu-latest
    needs: lint-test-python
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── API ──
      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          enable-cache: true
      - name: Install API dependencies
        working-directory: ./api
        run: uv sync

      # ── Frontend ──
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: front/package-lock.json
      - name: Install frontend dependencies
        working-directory: ./front
        run: npm ci
      - name: Build frontend (next build)
        working-directory: ./front
        env:
          NEXT_PUBLIC_DEV_MODE: "true"
          NEXT_DIST_DIR: .next-e2e
          NEXT_E2E_BUILD: "true"
          API_PORT: "8000"
          API_SERVER_HOST: localhost
        run: npx next build
      - name: Upload frontend build
        uses: actions/upload-artifact@v4
        with:
          name: next-e2e-build
          path: front/.next-e2e
          retention-days: 1
          if-no-files-found: error

      # ── API Docker image (validates Dockerfile + seeds GHA layer cache) ──
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build API Docker image
        uses: docker/build-push-action@v6
        with:
          context: ./api
          file: ./api/api.Dockerfile
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max

  e2e:
    name: E2E Tests (runner ${{ matrix.runner }})
    runs-on: ubuntu-latest
    needs: [e2e-plan, e2e-build]
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJson(needs.e2e-plan.outputs.matrix) }}
    env:
      MARIADB_USER: user
      MARIADB_PASSWORD: password
      MARIADB_ROOT_PASSWORD: rootpassword
      MARIADB_DATABASE: mawster-testing
    services:
      mariadb-test:
        image: mariadb
        env:
          MARIADB_USER: user
          MARIADB_PASSWORD: password
          MARIADB_ROOT_PASSWORD: rootpassword
          MARIADB_DATABASE: mawster-testing
        ports:
          - 3307:3306
        options: >-
          --health-cmd="healthcheck.sh --connect --innodb_initialized"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          enable-cache: true
      - name: Install API dependencies
        working-directory: ./api
        run: uv sync
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: front/package-lock.json
      - name: Install frontend dependencies
        working-directory: ./front
        run: npm ci
      - name: Install MariaDB client
        run: sudo apt-get install -y mariadb-client xvfb
      - name: Download frontend build
        uses: actions/download-artifact@v4
        with:
          name: next-e2e-build
          path: front/.next-e2e

      # ── Run Cypress ──
      - name: Run Cypress E2E tests (runner ${{ matrix.runner }})
        run: python3 scripts/e2e_parallel.py --workers 1 --spec "${{ matrix.specs }}" --skip-build --quiet
      - name: Upload Cypress results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cypress-results-runner-${{ matrix.runner }}
          path: front/cypress/results

  changes:
    if: github.ref_name == 'release'
    name: Detect changed paths
    runs-on: ubuntu-latest
    needs: e2e
    outputs:
      api: ${{ steps.filter.outputs.api }}
      front: ${{ steps.filter.outputs.front }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Detect changes
        uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            api:
              - 'api/**'
            front:
              - 'front/**'

  trivy:
    name: Trivy Security Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Run Trivy vulnerability scanner (filesystem)
        uses: aquasecurity/trivy-action@0.35.0
        with:
          scan-type: fs
          scan-ref: .
          severity: CRITICAL,HIGH
          exit-code: 0
          format: table

  docker-api:
    if: needs.changes.outputs.api == 'true'
    environment: Api
    name: Docker Build & Push (API)
    runs-on: ubuntu-latest
    needs:
      - changes
      - e2e
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Generate timestamp tag
        run: echo "TAG=$(date +'${{ vars.TIME_TAG_FORMAT }}')" >> $GITHUB_ENV
      - name: Build and push Docker image for the api
        uses: docker/build-push-action@v6
        with:
          context: ./api
          file: ./api/api.Dockerfile
          push: true
          tags: |
            ${{ vars.DOCKERHUB_USERNAME }}/mawster-api:latest
            ${{ vars.DOCKERHUB_USERNAME }}/mawster-api:${{ env.TAG }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  docker-front:
    if: needs.changes.outputs.front == 'true'
    environment: Api
    name: Docker Build & Push (Front)
    runs-on: ubuntu-latest
    needs:
      - changes
      - e2e
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Generate timestamp tag
        run: echo "TAG=$(date +'${{ vars.TIME_TAG_FORMAT }}')" >> $GITHUB_ENV
      - name: Build and push Docker image for the front
        uses: docker/build-push-action@v6
        with:
          context: ./front
          file: ./front/front.Dockerfile
          push: true
          build-args: |
            NEXT_PUBLIC_API_CLIENT_HOST=${{ vars.API_CLIENT_HOST }}
          tags: |
            ${{ vars.DOCKERHUB_USERNAME }}/mawster-front:latest
            ${{ vars.DOCKERHUB_USERNAME }}/mawster-front:${{ env.TAG }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
