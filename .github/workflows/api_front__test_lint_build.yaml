name: CI Pipeline

on:
  push:
    branches:
      - release
      - staging
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

env:
  WORKDIR: ./api
  PYTHON_VERSION: ${{ vars.PYTHON_VERSION }}
  NODE_VERSION: '24'
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
  E2E_RUNNERS: '8'

jobs:
  lint-test-python:
    name: Lint & Test for backend
    runs-on: ubuntu-latest
    env:
      MODE: dev
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          enable-cache: true
          # todo fix the pipeline later
      # - name: Install dev dependencies
      #   working-directory: ${{ env.WORKDIR }}
      #   run: uv sync --all-groups
      # - name: Run Ruff linter
      #   working-directory: ${{ env.WORKDIR }}
      #   run: uvx ruff check .
      # - name: Run Ruff formatter check
      #   working-directory: ${{ env.WORKDIR }}
      #   run: uvx ruff format --check .
      # - name: Run unit tests
      #   working-directory: ${{ env.WORKDIR }}
      #   run: uv run pytest tests/unit -v --tb=short
      # - name: Run integration tests
      #   working-directory: ${{ env.WORKDIR }}
      #   run: uv run pytest tests/integration -v --tb=short -n auto

  e2e-plan:
    name: E2E — Plan spec distribution
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.plan.outputs.matrix }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
      - name: Compute spec distribution
        id: plan
        run: echo "matrix=$(python3 scripts/e2e_parallel.py --plan --runners ${{ env.E2E_RUNNERS }})" >> $GITHUB_OUTPUT

  e2e-build:
    name: E2E — Build frontend
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      # ── Frontend ──
      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}
      - name: Cache node_modules
        id: cache-node-modules
        uses: actions/cache@v6
        with:
          path: |
            front/node_modules
            ~/.cache/Cypress
          key: node-modules-${{ runner.os }}-${{ hashFiles('front/package-lock.json') }}
      - name: Install frontend dependencies
        if: steps.cache-node-modules.outputs.cache-hit != 'true'
        working-directory: ./front
        run: npm ci
      - name: Build frontend (next build)
        working-directory: ./front
        env:
          NEXT_PUBLIC_DEV_MODE: 'true'
          NEXT_DIST_DIR: .next-e2e
          NEXT_E2E_BUILD: 'true'
          API_PORT: '8000'
          API_SERVER_HOST: localhost
        run: npx next build
      - name: Archive frontend build
        run: tar -czf /tmp/next-e2e-build.tar.gz -C front .next-e2e
      - name: Upload frontend build
        uses: actions/upload-artifact@v7
        with:
          name: next-e2e-build
          path: /tmp/next-e2e-build.tar.gz
          retention-days: 1
          if-no-files-found: error

  e2e:
    name: E2E Tests (runner ${{ matrix.runner }})
    runs-on: ubuntu-latest
    needs: [e2e-plan, e2e-build, lint-test-python]
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJson(needs.e2e-plan.outputs.matrix) }}
    env:
      MARIADB_USER: user
      MARIADB_PASSWORD: password
      MARIADB_ROOT_PASSWORD: rootpassword
      MARIADB_DATABASE: mawster-testing
    services:
      mariadb-test:
        image: mariadb
        env:
          MARIADB_USER: user
          MARIADB_PASSWORD: password
          MARIADB_ROOT_PASSWORD: rootpassword
          MARIADB_DATABASE: mawster-testing
        ports:
          - 3307:3306
        options: >-
          --health-cmd="healthcheck.sh --connect --innodb_initialized"
          --health-interval=2s
          --health-timeout=5s
          --health-retries=25
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          enable-cache: true
      - name: Install API dependencies
        working-directory: ./api
        run: uv sync --all-groups
      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}
      - name: Cache node_modules
        id: cache-node-modules
        uses: actions/cache@v6
        with:
          path: |
            front/node_modules
            ~/.cache/Cypress
          key: node-modules-${{ runner.os }}-${{ hashFiles('front/package-lock.json') }}
      - name: Install frontend dependencies
        if: steps.cache-node-modules.outputs.cache-hit != 'true'
        working-directory: ./front
        run: npm ci
      - name: Download frontend build
        uses: actions/download-artifact@v8
        with:
          name: next-e2e-build
          path: /tmp
      - name: Extract frontend build
        run: tar -xzf /tmp/next-e2e-build.tar.gz -C front

      # ── Run Cypress ──
      - name: Run Cypress E2E tests (runner ${{ matrix.runner }})
        run: python3 scripts/e2e_parallel.py --workers 1 --spec "${{ matrix.specs }}" --skip-build --quiet
      - name: Upload Cypress results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: cypress-results-runner-${{ matrix.runner }}
          path: front/cypress/results

  changes:
    if: github.ref_name == 'release' || github.ref_name == 'staging' || github.event_name == 'workflow_dispatch'
    name: Compute deploy metadata
    runs-on: ubuntu-latest
    needs: e2e
    outputs:
      moving_tag: ${{ steps.meta.outputs.moving_tag }}
      tag_prefix: ${{ steps.meta.outputs.tag_prefix }}
      also_staging: ${{ github.event_name == 'push' && github.ref_name == 'release' }}
    steps:
      - name: Compute deploy metadata
        id: meta
        run: |
          if [ "${{ github.event_name }}" = "push" ] && [ "${{ github.ref_name }}" = "release" ]; then
            echo "moving_tag=latest" >> "$GITHUB_OUTPUT"
            echo "tag_prefix=" >> "$GITHUB_OUTPUT"
          else
            echo "moving_tag=staging" >> "$GITHUB_OUTPUT"
            echo "tag_prefix=staging-" >> "$GITHUB_OUTPUT"
          fi

  docker-api:
    environment: Api
    name: Docker Build & Push (API)
    runs-on: ubuntu-latest
    needs:
      - changes
      - e2e
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Generate timestamp tag
        run: echo "TAG=$(date +'${{ vars.TIME_TAG_FORMAT }}')" >> $GITHUB_ENV
      - name: Build and push Docker image for the api
        uses: docker/build-push-action@v6
        with:
          context: ./api
          file: ./api/api.Dockerfile
          push: true
          tags: |
            ${{ vars.DOCKERHUB_USERNAME }}/mawster-api:${{ needs.changes.outputs.moving_tag }}
            ${{ vars.DOCKERHUB_USERNAME }}/mawster-api:${{ needs.changes.outputs.tag_prefix }}${{ env.TAG }}
            ${{ needs.changes.outputs.also_staging == 'true' && format('{0}/mawster-api:staging', vars.DOCKERHUB_USERNAME) || '' }}
          cache-from: type=registry,ref=${{ vars.DOCKERHUB_USERNAME }}/mawster-api:buildcache
          cache-to: type=registry,ref=${{ vars.DOCKERHUB_USERNAME }}/mawster-api:buildcache,mode=max

  docker-front:
    environment: Api
    name: Docker Build & Push (Front)
    runs-on: ubuntu-latest
    needs:
      - changes
      - e2e
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Generate timestamp tag
        run: echo "TAG=$(date +'${{ vars.TIME_TAG_FORMAT }}')" >> $GITHUB_ENV
      - name: Build and push Docker image for the front
        uses: docker/build-push-action@v6
        with:
          context: ./front
          file: ./front/front.Dockerfile
          push: true
          # Host-agnostic image: NEXT_PUBLIC_API_CLIENT_HOST is applied at runtime by run.sh (stack env).
          tags: |
            ${{ vars.DOCKERHUB_USERNAME }}/mawster-front:${{ needs.changes.outputs.moving_tag }}
            ${{ vars.DOCKERHUB_USERNAME }}/mawster-front:${{ needs.changes.outputs.tag_prefix }}${{ env.TAG }}
            ${{ needs.changes.outputs.also_staging == 'true' && format('{0}/mawster-front:staging', vars.DOCKERHUB_USERNAME) || '' }}
          cache-from: type=registry,ref=${{ vars.DOCKERHUB_USERNAME }}/mawster-front:buildcache
          cache-to: type=registry,ref=${{ vars.DOCKERHUB_USERNAME }}/mawster-front:buildcache,mode=max

  docker-migrate:
    environment: Api
    name: Docker Build & Push (Migrate)
    runs-on: ubuntu-latest
    needs:
      - changes
      - e2e
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Generate timestamp tag
        run: echo "TAG=$(date +'${{ vars.TIME_TAG_FORMAT }}')" >> $GITHUB_ENV
      - name: Build and push Docker image for migrate
        uses: docker/build-push-action@v6
        with:
          context: ./api
          file: ./api/migrate.Dockerfile
          push: true
          tags: |
            ${{ vars.DOCKERHUB_USERNAME }}/mawster-migrate:${{ needs.changes.outputs.moving_tag }}
            ${{ vars.DOCKERHUB_USERNAME }}/mawster-migrate:${{ needs.changes.outputs.tag_prefix }}${{ env.TAG }}
            ${{ needs.changes.outputs.also_staging == 'true' && format('{0}/mawster-migrate:staging', vars.DOCKERHUB_USERNAME) || '' }}
          cache-from: type=registry,ref=${{ vars.DOCKERHUB_USERNAME }}/mawster-migrate:buildcache
          cache-to: type=registry,ref=${{ vars.DOCKERHUB_USERNAME }}/mawster-migrate:buildcache,mode=max

  docker-backup:
    environment: Api
    name: Docker Build & Push (Backup)
    runs-on: ubuntu-latest
    needs:
      - changes
      - e2e
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Generate timestamp tag
        run: echo "TAG=$(date +'${{ vars.TIME_TAG_FORMAT }}')" >> $GITHUB_ENV
      - name: Build and push Docker image for backup
        uses: docker/build-push-action@v6
        with:
          context: ./backup
          file: ./backup/Dockerfile
          push: true
          tags: |
            ${{ vars.DOCKERHUB_USERNAME }}/mawster-backup:${{ needs.changes.outputs.moving_tag }}
            ${{ vars.DOCKERHUB_USERNAME }}/mawster-backup:${{ needs.changes.outputs.tag_prefix }}${{ env.TAG }}
            ${{ needs.changes.outputs.also_staging == 'true' && format('{0}/mawster-backup:staging', vars.DOCKERHUB_USERNAME) || '' }}
          cache-from: type=registry,ref=${{ vars.DOCKERHUB_USERNAME }}/mawster-backup:buildcache
          cache-to: type=registry,ref=${{ vars.DOCKERHUB_USERNAME }}/mawster-backup:buildcache,mode=max

  docker-static:
    environment: Api
    name: Docker Build & Push (Static)
    runs-on: ubuntu-latest
    needs:
      - changes
      - e2e
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Generate timestamp tag
        run: echo "TAG=$(date +'${{ vars.TIME_TAG_FORMAT }}')" >> $GITHUB_ENV
      - name: Build and push Docker image for static
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./static-assets/static.Dockerfile
          push: true
          tags: |
            ${{ vars.DOCKERHUB_USERNAME }}/mawster-static:${{ needs.changes.outputs.moving_tag }}
            ${{ vars.DOCKERHUB_USERNAME }}/mawster-static:${{ needs.changes.outputs.tag_prefix }}${{ env.TAG }}
            ${{ needs.changes.outputs.also_staging == 'true' && format('{0}/mawster-static:staging', vars.DOCKERHUB_USERNAME) || '' }}
          cache-from: type=registry,ref=${{ vars.DOCKERHUB_USERNAME }}/mawster-static:buildcache
          cache-to: type=registry,ref=${{ vars.DOCKERHUB_USERNAME }}/mawster-static:buildcache,mode=max

  deploy:
    name: Deploy to production
    runs-on: ubuntu-latest
    environment: Api
    concurrency:
      group: mawster-deploy
      cancel-in-progress: false
    needs: [changes, docker-api, docker-migrate, docker-front, docker-backup, docker-static]
    if: |
      always() &&
      github.event_name == 'push' && github.ref_name == 'release' &&
      (needs.docker-api.result == 'success' || needs.docker-migrate.result == 'success' || needs.docker-front.result == 'success' || needs.docker-backup.result == 'success' || needs.docker-static.result == 'success') &&
      needs.docker-api.result != 'failure' &&
      needs.docker-migrate.result != 'failure' &&
      needs.docker-front.result != 'failure' &&
      needs.docker-backup.result != 'failure' &&
      needs.docker-static.result != 'failure'
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -e
            cd /home/mawster/Mawster
            git config --global --add safe.directory /home/mawster/Mawster

            git fetch origin release
            # reset first: checkout --detach refuses to run on an unmerged index,
            # which past cross-merging pulls may have left behind.
            git reset --hard origin/release
            git checkout --detach

            make backup-now

            docker pull sneaxiii/mawster-api:latest
            docker pull sneaxiii/mawster-migrate:latest
            docker pull sneaxiii/mawster-front:latest
            docker pull sneaxiii/mawster-backup:latest
            docker pull sneaxiii/mawster-static:latest
            # Built by mcoc-vision's own CI, never by this workflow
            docker pull sneaxiii/mawster-vision-worker:latest

            docker service rm mawster-migrate 2>/dev/null || true

            docker service create \
              --name mawster-migrate \
              --network internal \
              --secret mawster_db_password \
              --secret mawster_db_root_password \
              -e MARIADB_USER=mawster \
              -e MARIADB_PORT=3306 \
              -e MARIADB_DATABASE=mawster \
              --mode replicated-job \
              sneaxiii/mawster-migrate:latest sh migrate.sh

            docker service logs mawster-migrate
            if docker service ps mawster-migrate --format "{{.CurrentState}}" | grep -q "^Failed"; then
              docker service rm mawster-migrate; exit 1
            fi
            docker service rm mawster-migrate

            docker stack deploy \
              --with-registry-auth \
              --resolve-image always \
              -c stack-app.yaml \
              mawster

  deploy-staging:
    name: Deploy to staging
    runs-on: ubuntu-latest
    environment: Api
    concurrency:
      group: mawster-deploy
      cancel-in-progress: false
    needs: [changes, docker-api, docker-migrate, docker-front, docker-backup, docker-static]
    if: |
      always() &&
      (github.event_name == 'workflow_dispatch' || github.ref_name == 'staging') &&
      (needs.docker-api.result == 'success' || needs.docker-migrate.result == 'success' || needs.docker-front.result == 'success' || needs.docker-backup.result == 'success' || needs.docker-static.result == 'success') &&
      needs.docker-api.result != 'failure' &&
      needs.docker-migrate.result != 'failure' &&
      needs.docker-front.result != 'failure' &&
      needs.docker-backup.result != 'failure' &&
      needs.docker-static.result != 'failure'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
      - name: Copy staging stack file
        uses: appleboy/scp-action@v1
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: stack-app-staging.yaml
          target: /home/mawster/staging/
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -e
            cd /home/mawster/staging

            docker exec $(docker ps -q -f name=mawster-staging_backup) /usr/local/bin/backup.sh

            docker pull sneaxiii/mawster-api:staging
            docker pull sneaxiii/mawster-migrate:staging
            docker pull sneaxiii/mawster-front:staging
            docker pull sneaxiii/mawster-backup:staging
            docker pull sneaxiii/mawster-static:staging

            docker service rm mawster-staging-migrate 2>/dev/null || true

            docker service create \
              --name mawster-staging-migrate \
              --network internal-staging \
              --secret source=mawster_db_password_staging,target=mawster_db_password \
              --secret source=mawster_db_root_password_staging,target=mawster_db_root_password \
              -e MARIADB_USER=mawster \
              -e MARIADB_PORT=3306 \
              -e MARIADB_DATABASE=mawster \
              --mode replicated-job \
              sneaxiii/mawster-migrate:staging sh migrate.sh

            docker service logs mawster-staging-migrate
            if docker service ps mawster-staging-migrate --format "{{.CurrentState}}" | grep -q "^Failed"; then
              docker service rm mawster-staging-migrate; exit 1
            fi
            docker service rm mawster-staging-migrate

            docker stack deploy \
              --with-registry-auth \
              --resolve-image always \
              -c stack-app-staging.yaml \
              mawster-staging
