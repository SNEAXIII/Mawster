name: CI Pipeline

on:
  push:
    branches:
      - release
  pull_request:
    branches:
      - main

permissions:
  contents: read

env:
  WORKDIR: ./api
  PYTHON_VERSION: ${{ vars.PYTHON_VERSION }}
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
  E2E_RUNNERS: '8'

jobs:
  lint-test-python:
    name: Lint & Test for backend
    runs-on: ubuntu-latest
    env:
      MODE: dev
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          enable-cache: true
      - name: Install dev dependencies
        working-directory: ${{ env.WORKDIR }}
        run: uv sync --all-groups
      - name: Run Ruff linter
        working-directory: ${{ env.WORKDIR }}
        run: uvx ruff check .
      - name: Run unit tests
        working-directory: ${{ env.WORKDIR }}
        run: uv run pytest tests/unit -v --tb=short
      - name: Run integration tests
        working-directory: ${{ env.WORKDIR }}
        run: uv run pytest tests/integration -v --tb=short -n auto

  e2e-plan:
    name: E2E — Plan spec distribution
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.plan.outputs.matrix }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
      - name: Compute spec distribution
        id: plan
        run: echo "matrix=$(python3 scripts/e2e_parallel.py --plan --runners ${{ env.E2E_RUNNERS }})" >> $GITHUB_OUTPUT

  e2e-build:
    name: E2E — Build frontend
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      # ── Frontend ──
      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 20
      - name: Cache node_modules
        id: cache-node-modules
        uses: actions/cache@v5
        with:
          path: |
            front/node_modules
            ~/.cache/Cypress
          key: node-modules-${{ runner.os }}-${{ hashFiles('front/package-lock.json') }}
      - name: Install frontend dependencies
        if: steps.cache-node-modules.outputs.cache-hit != 'true'
        working-directory: ./front
        run: npm ci
      - name: Build frontend (next build)
        working-directory: ./front
        env:
          NEXT_PUBLIC_DEV_MODE: 'true'
          NEXT_DIST_DIR: .next-e2e
          NEXT_E2E_BUILD: 'true'
          API_PORT: '8000'
          API_SERVER_HOST: localhost
        run: npx next build
      - name: Archive frontend build
        run: tar -czf /tmp/next-e2e-build.tar.gz -C front .next-e2e
      - name: Upload frontend build
        uses: actions/upload-artifact@v7
        with:
          name: next-e2e-build
          path: /tmp/next-e2e-build.tar.gz
          retention-days: 1
          if-no-files-found: error

  e2e:
    name: E2E Tests (runner ${{ matrix.runner }})
    runs-on: ubuntu-latest
    needs: [e2e-plan, e2e-build, lint-test-python]
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJson(needs.e2e-plan.outputs.matrix) }}
    env:
      MARIADB_USER: user
      MARIADB_PASSWORD: password
      MARIADB_ROOT_PASSWORD: rootpassword
      MARIADB_DATABASE: mawster-testing
    services:
      mariadb-test:
        image: mariadb
        env:
          MARIADB_USER: user
          MARIADB_PASSWORD: password
          MARIADB_ROOT_PASSWORD: rootpassword
          MARIADB_DATABASE: mawster-testing
        ports:
          - 3307:3306
        options: >-
          --health-cmd="healthcheck.sh --connect --innodb_initialized"
          --health-interval=2s
          --health-timeout=5s
          --health-retries=25
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          enable-cache: true
      - name: Install API dependencies
        working-directory: ./api
        run: uv sync --all-groups
      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 20
      - name: Cache node_modules
        id: cache-node-modules
        uses: actions/cache@v5
        with:
          path: |
            front/node_modules
            ~/.cache/Cypress
          key: node-modules-${{ runner.os }}-${{ hashFiles('front/package-lock.json') }}
      - name: Install frontend dependencies
        if: steps.cache-node-modules.outputs.cache-hit != 'true'
        working-directory: ./front
        run: npm ci
      - name: Download frontend build
        uses: actions/download-artifact@v5
        with:
          name: next-e2e-build
          path: /tmp
      - name: Extract frontend build
        run: tar -xzf /tmp/next-e2e-build.tar.gz -C front

      # ── Run Cypress ──
      - name: Run Cypress E2E tests (runner ${{ matrix.runner }})
        run: python3 scripts/e2e_parallel.py --workers 1 --spec "${{ matrix.specs }}" --skip-build --quiet
      - name: Upload Cypress results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: cypress-results-runner-${{ matrix.runner }}
          path: front/cypress/results

  changes:
    if: github.ref_name == 'release'
    name: Detect changed paths
    runs-on: ubuntu-latest
    needs: e2e
    outputs:
      api: ${{ steps.filter.outputs.api }}
      front: ${{ steps.filter.outputs.front }}
      backup: ${{ steps.filter.outputs.backup }}
      static: ${{ steps.filter.outputs.static }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - name: Detect changes
        id: filter
        run: |
          BEFORE="${{ github.event.before }}"
          SHA="${{ github.sha }}"
          API=$(git diff --name-only "${BEFORE}...${SHA}" -- api/ | wc -l | tr -d ' ')
          FRONT=$(git diff --name-only "${BEFORE}...${SHA}" -- front/ | wc -l | tr -d ' ')
          BACKUP=$(git diff --name-only "${BEFORE}...${SHA}" -- backup/ | wc -l | tr -d ' ')
          STATIC=$(git diff --name-only "${BEFORE}...${SHA}" -- static-assets/ | wc -l | tr -d ' ')
          echo "api=$([ "$API" -gt 0 ] && echo 'true' || echo 'false')" >> $GITHUB_OUTPUT
          echo "front=$([ "$FRONT" -gt 0 ] && echo 'true' || echo 'false')" >> $GITHUB_OUTPUT
          echo "backup=$([ "$BACKUP" -gt 0 ] && echo 'true' || echo 'false')" >> $GITHUB_OUTPUT
          echo "static=$([ "$STATIC" -gt 0 ] && echo 'true' || echo 'false')" >> $GITHUB_OUTPUT

  docker-api:
    if: needs.changes.outputs.api == 'true'
    environment: Api
    name: Docker Build & Push (API)
    runs-on: ubuntu-latest
    needs:
      - changes
      - e2e
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Generate timestamp tag
        run: echo "TAG=$(date +'${{ vars.TIME_TAG_FORMAT }}')" >> $GITHUB_ENV
      - name: Build and push Docker image for the api
        uses: docker/build-push-action@v6
        with:
          context: ./api
          file: ./api/api.Dockerfile
          push: true
          tags: |
            ${{ vars.DOCKERHUB_USERNAME }}/mawster-api:latest
            ${{ vars.DOCKERHUB_USERNAME }}/mawster-api:${{ env.TAG }}
          cache-from: type=registry,ref=${{ vars.DOCKERHUB_USERNAME }}/mawster-api:buildcache
          cache-to: type=registry,ref=${{ vars.DOCKERHUB_USERNAME }}/mawster-api:buildcache,mode=max

  docker-front:
    if: needs.changes.outputs.front == 'true'
    environment: Api
    name: Docker Build & Push (Front)
    runs-on: ubuntu-latest
    needs:
      - changes
      - e2e
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Generate timestamp tag
        run: echo "TAG=$(date +'${{ vars.TIME_TAG_FORMAT }}')" >> $GITHUB_ENV
      - name: Build and push Docker image for the front
        uses: docker/build-push-action@v6
        with:
          context: ./front
          file: ./front/front.Dockerfile
          push: true
          build-args: |
            NEXT_PUBLIC_API_CLIENT_HOST=${{ vars.API_CLIENT_HOST }}
          tags: |
            ${{ vars.DOCKERHUB_USERNAME }}/mawster-front:latest
            ${{ vars.DOCKERHUB_USERNAME }}/mawster-front:${{ env.TAG }}
          cache-from: type=registry,ref=${{ vars.DOCKERHUB_USERNAME }}/mawster-front:buildcache
          cache-to: type=registry,ref=${{ vars.DOCKERHUB_USERNAME }}/mawster-front:buildcache,mode=max

  docker-migrate:
    if: needs.changes.outputs.api == 'true'
    environment: Api
    name: Docker Build & Push (Migrate)
    runs-on: ubuntu-latest
    needs:
      - changes
      - e2e
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Generate timestamp tag
        run: echo "TAG=$(date +'${{ vars.TIME_TAG_FORMAT }}')" >> $GITHUB_ENV
      - name: Build and push Docker image for migrate
        uses: docker/build-push-action@v6
        with:
          context: ./api
          file: ./api/migrate.Dockerfile
          push: true
          tags: |
            ${{ vars.DOCKERHUB_USERNAME }}/mawster-migrate:latest
            ${{ vars.DOCKERHUB_USERNAME }}/mawster-migrate:${{ env.TAG }}
          cache-from: type=registry,ref=${{ vars.DOCKERHUB_USERNAME }}/mawster-migrate:buildcache
          cache-to: type=registry,ref=${{ vars.DOCKERHUB_USERNAME }}/mawster-migrate:buildcache,mode=max

  docker-backup:
    if: needs.changes.outputs.backup == 'true'
    environment: Api
    name: Docker Build & Push (Backup)
    runs-on: ubuntu-latest
    needs:
      - changes
      - e2e
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Generate timestamp tag
        run: echo "TAG=$(date +'${{ vars.TIME_TAG_FORMAT }}')" >> $GITHUB_ENV
      - name: Build and push Docker image for backup
        uses: docker/build-push-action@v6
        with:
          context: ./backup
          file: ./backup/Dockerfile
          push: true
          tags: |
            ${{ vars.DOCKERHUB_USERNAME }}/mawster-backup:latest
            ${{ vars.DOCKERHUB_USERNAME }}/mawster-backup:${{ env.TAG }}
          cache-from: type=registry,ref=${{ vars.DOCKERHUB_USERNAME }}/mawster-backup:buildcache
          cache-to: type=registry,ref=${{ vars.DOCKERHUB_USERNAME }}/mawster-backup:buildcache,mode=max

  docker-static:
    if: needs.changes.outputs.static == 'true'
    environment: Api
    name: Docker Build & Push (Static)
    runs-on: ubuntu-latest
    needs:
      - changes
      - e2e
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Generate timestamp tag
        run: echo "TAG=$(date +'${{ vars.TIME_TAG_FORMAT }}')" >> $GITHUB_ENV
      - name: Build and push Docker image for static
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./static-assets/static.Dockerfile
          push: true
          tags: |
            ${{ vars.DOCKERHUB_USERNAME }}/mawster-static:latest
            ${{ vars.DOCKERHUB_USERNAME }}/mawster-static:${{ env.TAG }}
          cache-from: type=registry,ref=${{ vars.DOCKERHUB_USERNAME }}/mawster-static:buildcache
          cache-to: type=registry,ref=${{ vars.DOCKERHUB_USERNAME }}/mawster-static:buildcache,mode=max

  deploy:
    name: Deploy to production
    runs-on: ubuntu-latest
    environment: Api
    needs: [docker-api, docker-migrate, docker-front, docker-backup, docker-static]
    if: |
      always() &&
      (needs.docker-api.result == 'success' || needs.docker-migrate.result == 'success' || needs.docker-front.result == 'success' || needs.docker-backup.result == 'success' || needs.docker-static.result == 'success') &&
      needs.docker-api.result != 'failure' &&
      needs.docker-migrate.result != 'failure' &&
      needs.docker-front.result != 'failure' &&
      needs.docker-backup.result != 'failure' &&
      needs.docker-static.result != 'failure'
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /root/Mawster

            make backup-now

            docker pull sneaxiii/mawster-api:latest
            docker pull sneaxiii/mawster-migrate:latest
            docker pull sneaxiii/mawster-front:latest
            docker pull sneaxiii/mawster-backup:latest
            docker pull sneaxiii/mawster-static:latest

            docker service rm mawster-migrate 2>/dev/null || true

            docker service create \
              --name mawster-migrate \
              --network internal \
              --secret mawster_db_password \
              --secret mawster_db_root_password \
              -e MARIADB_USER=mawster \
              -e MARIADB_PORT=3306 \
              -e MARIADB_DATABASE=mawster \
              --mode replicated-job \
              sneaxiii/mawster-migrate:latest sh migrate.sh

            docker service logs mawster-migrate
            if docker service ps mawster-migrate --format "{{.CurrentState}}" | grep -q "^Failed"; then
              docker service rm mawster-migrate; exit 1
            fi
            docker service rm mawster-migrate

            docker stack deploy \
              --with-registry-auth \
              --resolve-image always \
              -c stack-app.yaml \
              mawster
