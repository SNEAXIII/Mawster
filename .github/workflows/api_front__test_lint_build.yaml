name: CI Pipeline

on:
  push:
    branches:
      - main
      - release
  pull_request:
    branches:
      - main
      - release
permissions:
  contents: read
env:
  WORKDIR: ./api
  PYTHON_VERSION: ${{ vars.PYTHON_VERSION }}
jobs:
  lint-test:
    name: Lint & Test
    runs-on: ubuntu-latest
    env:
      MODE: dev
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          enable-cache: true
      - name: Install dev dependencies
        working-directory: ${{ env.WORKDIR }}
        run: uv sync --extra dev
      - name: Run Ruff linter
        uses: astral-sh/ruff-action@v3
        with:
          src: ${{ env.WORKDIR }}
      - name: Run unit tests
        working-directory: ${{ env.WORKDIR }}
        run: uv run pytest tests/unit -v --tb=short
      - name: Run integration tests
        working-directory: ${{ env.WORKDIR }}
        run: uv run pytest tests/integration -v --tb=short -n auto

  e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    needs: lint-test
    env:
      MARIADB_USER: user
      MARIADB_PASSWORD: password
      MARIADB_ROOT_PASSWORD: rootpassword
      MARIADB_DATABASE: mawster-testing
    services:
      mariadb:
        image: mariadb
        env:
          MARIADB_USER: user
          MARIADB_PASSWORD: password
          MARIADB_ROOT_PASSWORD: rootpassword
          MARIADB_DATABASE: mawster-testing
        ports:
          - 3306:3306
        options: >-
          --health-cmd="healthcheck.sh --connect --innodb_initialized"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── API setup ──
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          enable-cache: true
      - name: Install API dependencies
        working-directory: ./api
        run: uv sync
      - name: Start API server
        working-directory: ./api
        env:
          SECRET_KEY: ci-test-secret-key-for-e2e-tests
          MARIADB_PORT: 3306
          ALGORITHM: HS256
          ACCESS_TOKEN_EXPIRE_MINUTES: 60
        run: uv run app_testing.py &

      # ── Frontend setup ──
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: front/package-lock.json
      - name: Install frontend dependencies
        working-directory: ./front
        run: npm ci
      - name: Start frontend dev server
        working-directory: ./front
        env:
          NEXTAUTH_SECRET: ci-test-nextauth-secret
          NEXTAUTH_URL: http://localhost:3000
        run: npm run testing &

      # ── Wait for services ──
      - name: Wait for API
        run: |
          for i in $(seq 1 30); do
            curl -s http://localhost:8001 > /dev/null && break
            sleep 2
          done
      - name: Wait for frontend
        run: |
          for i in $(seq 1 60); do
            curl -s http://localhost:3000 > /dev/null && break
            sleep 2
          done

      # ── Run Cypress ──
      - name: Run Cypress E2E tests
        working-directory: ./front
        run: npx cypress run
      - name: Upload Cypress videos
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: cypress-videos
          path: front/cypress/results/videos
      - name: Upload Cypress screenshots
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: cypress-screenshots
          path: front/cypress/results/screenshots

  changes:
    if: github.ref_name == 'release'
    name: Detect changed paths
    runs-on: ubuntu-latest
    needs: lint-test
    outputs:
      api: ${{ steps.filter.outputs.api }}
      front: ${{ steps.filter.outputs.front }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Detect changes
        uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            api:
              - 'api/**'
            front:
              - 'front/**'

  trivy:
    name: Trivy Security Scan
    runs-on: ubuntu-latest
    needs: lint-test
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Run Trivy vulnerability scanner (filesystem)
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: .
          severity: CRITICAL,HIGH
          exit-code: 0
          format: table

  docker-api:
    if: needs.changes.outputs.api == 'true'
    environment: Api
    name: Docker Build & Push (API)
    runs-on: ubuntu-latest
    needs: changes
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Generate timestamp tag
        run: echo "TAG=$(date +'${{ vars.TIME_TAG_FORMAT }}')" >> $GITHUB_ENV
      - name: Build and push Docker image for the api
        uses: docker/build-push-action@v6
        with:
          context: ./api
          file: ./api/api.Dockerfile
          push: true
          tags: |
            ${{ vars.DOCKERHUB_USERNAME }}/mawster-api:latest
            ${{ vars.DOCKERHUB_USERNAME }}/mawster-api:${{ env.TAG }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  docker-front:
    if: needs.changes.outputs.front == 'true'
    environment: Api
    name: Docker Build & Push (Front)
    runs-on: ubuntu-latest
    needs: changes
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Generate timestamp tag
        run: echo "TAG=$(date +'${{ vars.TIME_TAG_FORMAT }}')" >> $GITHUB_ENV
      - name: Build and push Docker image for the front
        uses: docker/build-push-action@v6
        with:
          context: ./front
          file: ./front/front.Dockerfile
          push: true
          build-args: |
            NEXT_PUBLIC_API_CLIENT_HOST=${{ vars.API_CLIENT_HOST }}
          tags: |
            ${{ vars.DOCKERHUB_USERNAME }}/mawster-front:latest
            ${{ vars.DOCKERHUB_USERNAME }}/mawster-front:${{ env.TAG }}
          cache-from: type=gha
          cache-to: type=gha,mode=max