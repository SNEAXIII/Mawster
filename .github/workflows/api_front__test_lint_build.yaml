name: CI Pipeline

on:
  push:
    branches:
      - main
      - release
  pull_request:
    branches:
      - main
      - release
permissions:
  contents: read
env:
  WORKDIR: ./api
  PYTHON_VERSION: ${{ vars.PYTHON_VERSION }}
jobs:
  lint-test-python:
    name: Lint & Test for bakend
    runs-on: ubuntu-latest
    needs: trivy
    env:
      MODE: dev
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          enable-cache: true
      - name: Install dev dependencies
        working-directory: ${{ env.WORKDIR }}
        run: uv sync --extra dev
      - name: Run Ruff linter
        uses: astral-sh/ruff-action@v3
        with:
          src: ${{ env.WORKDIR }}
      - name: Run unit tests
        working-directory: ${{ env.WORKDIR }}
        run: uv run pytest tests/unit -v --tb=short
      - name: Run integration tests
        working-directory: ${{ env.WORKDIR }}
        run: uv run pytest tests/integration -v --tb=short -n auto

  # ── Phase 1: build frontend + API image once, share via artifacts/cache ──────
  e2e-prepare:
    name: E2E Prepare (build)
    runs-on: ubuntu-latest
    needs: lint-test-python
    env:
      MARIADB_USER: user
      MARIADB_PASSWORD: password
      MARIADB_ROOT_PASSWORD: rootpassword
      MARIADB_DATABASE: mawster-testing
    services:
      mariadb-test:
        image: mariadb
        env:
          MARIADB_USER: user
          MARIADB_PASSWORD: password
          MARIADB_ROOT_PASSWORD: rootpassword
          MARIADB_DATABASE: mawster-testing
        ports:
          - 3307:3306
        options: >-
          --health-cmd="healthcheck.sh --connect --innodb_initialized"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          enable-cache: true
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: front/package-lock.json
      - name: Install frontend dependencies
        working-directory: ./front
        run: npm ci
      - name: Install mariadb-client
        run: sudo apt-get install -y mariadb-client
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build API Docker image (seeds GHA layer cache)
        uses: docker/build-push-action@v6
        with:
          context: ./api
          file: ./api/api.Dockerfile
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Build frontend (.next-e2e)
        run: python3 scripts/e2e_parallel.py --prep --quiet
      - name: Upload .next-e2e artifact
        uses: actions/upload-artifact@v4
        with:
          name: e2e-next-build
          path: front/.next-e2e
          retention-days: 1

  # ── Phase 2: 4 workers en parallèle, chacun sur son propre runner ────────────
  e2e-worker:
    name: E2E Worker ${{ matrix.worker_id }}
    runs-on: ubuntu-latest
    needs: e2e-prepare
    strategy:
      fail-fast: false
      matrix:
        worker_id: [0, 1, 2, 3]
    env:
      MARIADB_USER: user
      MARIADB_PASSWORD: password
      MARIADB_ROOT_PASSWORD: rootpassword
      MARIADB_DATABASE: mawster-testing
    services:
      mariadb-test:
        image: mariadb
        env:
          MARIADB_USER: user
          MARIADB_PASSWORD: password
          MARIADB_ROOT_PASSWORD: rootpassword
          MARIADB_DATABASE: mawster-testing
        ports:
          - 3307:3306
        options: >-
          --health-cmd="healthcheck.sh --connect --innodb_initialized"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          enable-cache: true
      - name: Install API dependencies
        working-directory: ./api
        run: uv sync
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: front/package-lock.json
      - name: Install frontend dependencies
        working-directory: ./front
        run: npm ci
      - name: Install mariadb-client
        run: sudo apt-get install -y mariadb-client xvfb
      - name: Download .next-e2e artifact
        uses: actions/download-artifact@v4
        with:
          name: e2e-next-build
          path: front/.next-e2e
      - name: Run E2E worker ${{ matrix.worker_id }}
        run: >
          python3 scripts/e2e_parallel.py
          --worker-id ${{ matrix.worker_id }}
          --total-workers 4
          --quiet
      - name: Upload worker results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-results-${{ matrix.worker_id }}
          path: front/cypress/results/workers/worker-${{ matrix.worker_id }}
          retention-days: 1

  # ── Phase 3: merge tous les résultats en un seul report.json ─────────────────
  e2e-merge:
    name: E2E Merge Results
    runs-on: ubuntu-latest
    needs: e2e-worker
    if: always()
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Download worker 0 results
        uses: actions/download-artifact@v4
        with:
          name: e2e-results-0
          path: front/cypress/results/workers/worker-0
      - name: Download worker 1 results
        uses: actions/download-artifact@v4
        with:
          name: e2e-results-1
          path: front/cypress/results/workers/worker-1
      - name: Download worker 2 results
        uses: actions/download-artifact@v4
        with:
          name: e2e-results-2
          path: front/cypress/results/workers/worker-2
      - name: Download worker 3 results
        uses: actions/download-artifact@v4
        with:
          name: e2e-results-3
          path: front/cypress/results/workers/worker-3
      - name: Merge results
        run: python3 scripts/e2e_parallel.py --merge --workers 4
      - name: Upload final report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cypress-results
          path: front/cypress/results

  changes:
    if: github.ref_name == 'release'
    name: Detect changed paths
    runs-on: ubuntu-latest
    needs: trivy
    outputs:
      api: ${{ steps.filter.outputs.api }}
      front: ${{ steps.filter.outputs.front }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Detect changes
        uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            api:
              - 'api/**'
            front:
              - 'front/**'

  trivy:
    name: Trivy Security Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Run Trivy vulnerability scanner (filesystem)
        uses: aquasecurity/trivy-action@0.35.0
        with:
          scan-type: fs
          scan-ref: .
          severity: CRITICAL,HIGH
          exit-code: 0
          format: table

  docker-api:
    if: needs.changes.outputs.api == 'true'
    environment: Api
    name: Docker Build & Push (API)
    runs-on: ubuntu-latest
    needs:
      - changes
      - e2e-merge
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Generate timestamp tag
        run: echo "TAG=$(date +'${{ vars.TIME_TAG_FORMAT }}')" >> $GITHUB_ENV
      - name: Build and push Docker image for the api
        uses: docker/build-push-action@v6
        with:
          context: ./api
          file: ./api/api.Dockerfile
          push: true
          tags: |
            ${{ vars.DOCKERHUB_USERNAME }}/mawster-api:latest
            ${{ vars.DOCKERHUB_USERNAME }}/mawster-api:${{ env.TAG }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  docker-front:
    if: needs.changes.outputs.front == 'true'
    environment: Api
    name: Docker Build & Push (Front)
    runs-on: ubuntu-latest
    needs:
      - changes
      - e2e-merge
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Generate timestamp tag
        run: echo "TAG=$(date +'${{ vars.TIME_TAG_FORMAT }}')" >> $GITHUB_ENV
      - name: Build and push Docker image for the front
        uses: docker/build-push-action@v6
        with:
          context: ./front
          file: ./front/front.Dockerfile
          push: true
          build-args: |
            NEXT_PUBLIC_API_CLIENT_HOST=${{ vars.API_CLIENT_HOST }}
          tags: |
            ${{ vars.DOCKERHUB_USERNAME }}/mawster-front:latest
            ${{ vars.DOCKERHUB_USERNAME }}/mawster-front:${{ env.TAG }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
