[project]
name = "mawster-api"
version = "0.1.0"
description = "Mawster API - MCOC Alliance Management"
requires-python = ">=3.12"
dependencies = [
    "fastapi[standard]",
    "pyjwt",
    "python-multipart",
    "pydantic-settings",
    "sqlmodel",
    "aiomysql",
    "bleach",
    "sentry-sdk",
    "slowapi",
    "prometheus-fastapi-instrumentator",
]

[project.optional-dependencies]
dev = [
    "icecream",
    "pytest",
    "aiosqlite",
    "pytest-asyncio",
    "pytest-mock",
    "pytest-cov",
    "pytest-xdist",
    "pytest-mock",
    "faker",
    "time-machine",
    "beautifulsoup4",
    "curl_cffi",
    "lxml",
    "Pillow",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src"]

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]

[tool.coverage.run]
source = ["src"]
omit = ["tests/*", "migrations/*", "scripts/*"]
concurrency = ["greenlet", "thread"]

[dependency-groups]
migrate = [
    "alembic",
    "pymysql",
    "sqlmodel",
]
dev = [
    "aiosqlite>=0.22.1",
    "anyio>=4.12.1",
    "httpx>=0.28.1",
    "pytest>=9.0.2",
    "pytest-asyncio>=1.3.0",
    "vulture>=2.16",
]
