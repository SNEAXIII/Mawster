networks:
  internal-dev:
    driver: bridge

services:
  mariadb-dev:
    image: mariadb
    ports:
      - 3305:3306
    container_name: mariadb-dev
    networks:
      - internal-dev
    environment:
      - MARIADB_DATABASE=mawster
      - MARIADB_USER=user
      - MARIADB_PASSWORD=password
      - MARIADB_ROOT_PASSWORD=rootpassword
    volumes:
      - ./db/mawster-db:/var/lib/mysql
  phpmyadmin-dev:
    image: phpmyadmin/phpmyadmin
    ports:
      - 8080:80
    container_name: myadmin-dev
    networks:
      - internal-dev
    environment:
      - PMA_HOST=mariadb-dev
      - PMA_PORT=3306
    depends_on:
      - mariadb-dev
  mariadb-test:
    image: mariadb
    ports:
      - 3307:3306
    container_name: mariadb-test
    networks:
      - internal-dev
    environment:
      - MARIADB_DATABASE=mawster
      - MARIADB_USER=user
      - MARIADB_PASSWORD=password
      - MARIADB_ROOT_PASSWORD=rootpassword
  phpmyadmin-test:
    image: phpmyadmin/phpmyadmin
    ports:
      - 8081:80
    container_name: myadmin-test
    networks:
      - internal-dev
    environment:
      - PMA_HOST=mariadb-test
      - PMA_PORT=3306
    depends_on:
      - mariadb-test
  rabbitmq:
    image: rabbitmq:3.13-management
    container_name: rabbitmq-dev
    networks:
      - internal-dev
    ports:
      - 5672:5672
      - 15672:15672
    environment:
      - RABBITMQ_DEFAULT_USER=mawster
      - RABBITMQ_DEFAULT_PASS=mawster
    healthcheck:
      test: ['CMD', 'rabbitmq-diagnostics', '-q', 'check_port_connectivity']
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 30s
  rustfs:
    image: rustfs/rustfs:latest
    container_name: rustfs-dev
    networks:
      - internal-dev
    ports:
      - 9000:9000
      - 9001:9001
    environment:
      - RUSTFS_ACCESS_KEY=mawster
      - RUSTFS_SECRET_KEY=mawsterpassword
      - RUSTFS_CONSOLE_ENABLE=true
  # One-shot: RustFS starts with no buckets, and nothing in the API creates them.
  # Without this, a fresh `make vision-up` yields a working store whose first
  # upload fails with NoSuchBucket.
  rustfs-init:
    image: amazon/aws-cli:latest
    container_name: rustfs-init
    networks:
      - internal-dev
    depends_on:
      - rustfs
    environment:
      - AWS_ACCESS_KEY_ID=mawster
      - AWS_SECRET_ACCESS_KEY=mawsterpassword
      - AWS_DEFAULT_REGION=us-east-1
    entrypoint:
      - sh
      - -c
      - |
        until aws --endpoint-url http://rustfs:9000 s3 ls > /dev/null 2>&1; do
          echo "waiting for rustfs..."; sleep 2;
        done
        aws --endpoint-url http://rustfs:9000 s3 mb s3://vision  2>/dev/null || true
        aws --endpoint-url http://rustfs:9000 s3 mb s3://dataset 2>/dev/null || true
        aws --endpoint-url http://rustfs:9000 s3 ls
    restart: 'no'
    volumes:
      - ./db/rustfs-data:/data
  vision-worker:
    build:
      context: ./mcoc-vision
    image: mawster-vision-worker:local
    container_name: vision-worker
    networks:
      - internal-dev
    depends_on:
      rabbitmq:
        condition: service_healthy
    environment:
      - RABBITMQ_URL=amqp://mawster:mawster@rabbitmq:5672/
      - RUSTFS_ENDPOINT=http://rustfs:9000
      - RUSTFS_ACCESS_KEY=mawster
      - RUSTFS_SECRET_KEY=mawsterpassword
      - RUSTFS_BUCKET_VISION=vision
      - MCOC_DEVICE=cpu
    restart: unless-stopped
  static:
    build:
      context: .
      dockerfile: static-assets/static.Dockerfile
    container_name: static-dev
    ports:
      - "8002:80"
    networks:
      - internal-dev
    environment:
      - API_HOST=host.docker.internal:8000
    extra_hosts:
      - "host.docker.internal:host-gateway"
