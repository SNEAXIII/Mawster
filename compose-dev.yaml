networks:
  internal-dev:
    driver: bridge

services:
  mariadb-dev:
    image: mariadb
    ports:
      - 3305:3306
    container_name: mariadb-dev
    networks:
      - internal-dev
    environment:
      - MARIADB_DATABASE=mawster
      - MARIADB_USER=user
      - MARIADB_PASSWORD=password
      - MARIADB_ROOT_PASSWORD=rootpassword
    volumes:
      - ./db/mawster-db:/var/lib/mysql
  phpmyadmin-dev:
    image: phpmyadmin/phpmyadmin
    ports:
      - 8080:80
    container_name: myadmin-dev
    networks:
      - internal-dev
    environment:
      - PMA_HOST=mariadb-dev
      - PMA_PORT=3306
    depends_on:
      - mariadb-dev
  mariadb-test:
    image: mariadb
    ports:
      - 3307:3306
    container_name: mariadb-test
    networks:
      - internal-dev
    environment:
      - MARIADB_DATABASE=mawster
      - MARIADB_USER=user
      - MARIADB_PASSWORD=password
      - MARIADB_ROOT_PASSWORD=rootpassword
  phpmyadmin-test:
    image: phpmyadmin/phpmyadmin
    ports:
      - 8081:80
    container_name: myadmin-test
    networks:
      - internal-dev
    environment:
      - PMA_HOST=mariadb-test
      - PMA_PORT=3306
    depends_on:
      - mariadb-test
  rabbitmq:
    image: rabbitmq:3.13-management
    container_name: rabbitmq-dev
    networks:
      - internal-dev
    ports:
      - 5672:5672
      - 15672:15672
    environment:
      - RABBITMQ_DEFAULT_USER=mawster
      - RABBITMQ_DEFAULT_PASS=mawster
    healthcheck:
      test: ['CMD', 'rabbitmq-diagnostics', '-q', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5
  rustfs:
    image: rustfs/rustfs:latest
    container_name: rustfs-dev
    networks:
      - internal-dev
    ports:
      - 9000:9000
      - 9001:9001
    environment:
      - RUSTFS_ACCESS_KEY=mawster
      - RUSTFS_SECRET_KEY=mawsterpassword
      - RUSTFS_CONSOLE_ENABLE=true
    volumes:
      - ./db/rustfs-data:/data
  static:
    build:
      context: .
      dockerfile: static-assets/static.Dockerfile
    container_name: static-dev
    ports:
      - "8002:80"
    networks:
      - internal-dev
    environment:
      - API_HOST=host.docker.internal:8000
    extra_hosts:
      - "host.docker.internal:host-gateway"
