repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.11.7
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  # Prettier runs from the project's own node_modules rather than a pinned mirror, so the hook
  # and `npm run format` can never format the same file differently.
  - repo: local
    hooks:
      - id: prettier
        name: prettier (front)
        entry: front/node_modules/.bin/prettier --write --ignore-path front/.prettierignore
        language: system
        files: ^front/.*\.(ts|tsx|js|jsx|mjs|cjs|css|json|md)$
        exclude: ^front/(node_modules|\.next)/
