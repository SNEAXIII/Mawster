networks:
  traefik-public:
    external: true
  internal:
    external: true
    attachable: true

secrets:
  mawster_secret_key:
    external: true
  mawster_db_password:
    external: true
  mawster_db_root_password:
    external: true
  mawster_email_pepper:
    external: true
  mawster_nextauth_secret:
    external: true
  mawster_discord_client_id:
    external: true
  mawster_discord_client_secret:
    external: true
  mawster_google_client_id:
    external: true
  mawster_google_client_secret:
    external: true
  mawster_rclone_conf:
    external: true
  mawster_rabbitmq_pass:
    external: true
  mawster_rustfs_access_key:
    external: true
  mawster_rustfs_secret_key:
    external: true

services:
  traefik:
    image: traefik:v3
    ports:
      - '80:80'
      - '443:443'
    networks:
      - traefik-public
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - traefik_data:/data
    command:
      - --providers.swarm=true
      - --providers.swarm.exposedByDefault=false
      - --providers.swarm.network=traefik-public
      - --entrypoints.web.address=:80
      - --entrypoints.websecure.address=:443
      - --entrypoints.web.http.redirections.entrypoint.to=websecure
      - --entrypoints.web.http.redirections.entrypoint.scheme=https
      - --entrypoints.web.http.redirections.entrypoint.permanent=true
      - --certificatesresolvers.letsencrypt.acme.httpchallenge=true
      - --certificatesresolvers.letsencrypt.acme.httpchallenge.entrypoint=web
      - --certificatesresolvers.letsencrypt.acme.email=misterbalise2@gmail.com
      - --certificatesresolvers.letsencrypt.acme.storage=/data/acme.json
      - --metrics.prometheus=true
      - --metrics.prometheus.entrypoint=metrics
      - --entrypoints.metrics.address=:8082
    deploy:
      placement:
        constraints:
          - node.role == manager
      restart_policy:
        condition: on-failure
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: '5'

  mariadb:
    image: mariadb:11.4
    networks:
      - internal
    ports:
      - target: 3306
        published: 3306
        protocol: tcp
        mode: host
    environment:
      MARIADB_USER: mawster
      MARIADB_DATABASE: mawster
      MARIADB_PASSWORD_FILE: /run/secrets/mawster_db_password
      MARIADB_ROOT_PASSWORD_FILE: /run/secrets/mawster_db_root_password
    secrets:
      - mawster_db_password
      - mawster_db_root_password
    volumes:
      - data_db:/var/lib/mysql
    healthcheck:
      test: ['CMD', 'healthcheck.sh', '--connect', '--innodb_initialized']
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.role == manager
      restart_policy:
        condition: on-failure
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: '5'

  api:
    image: sneaxiii/mawster-api:latest
    networks:
      - internal
    environment:
      MODE: prod
      CONTAINER: '1'
      ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: '60'
      REFRESH_TOKEN_EXPIRE_DAYS: '7'
      MARIADB_USER: mawster
      MARIADB_PORT: '3306'
      MARIADB_DATABASE: mawster
      ALLOWED_ORIGINS: https://www.mawster.app
      API_PORT: '8000'
      EMAIL_PEPPER_VERSION: '1'
      # Vision: the API publishes jobs to RabbitMQ and reads crops/results from
      # RustFS. Bucket names + retention are plain config; the broker URL and the
      # store keys are injected from secret files by the command shim below.
      RUSTFS_ENDPOINT: http://rustfs:9000
      RUSTFS_BUCKET_VISION: vision
      RUSTFS_BUCKET_DATASET: dataset
      VISION_RETENTION_DAYS: '7'
    secrets:
      - mawster_secret_key
      - mawster_db_password
      - mawster_email_pepper
      - mawster_rabbitmq_pass
      - mawster_rustfs_access_key
      - mawster_rustfs_secret_key
    volumes:
      - api_logs:/app/api/logs
    # run.sh reads the vision secrets from /run/secrets (same as the db/pepper
    # secrets) and exports RABBITMQ_URL / RUSTFS_* before starting the API.
    command: ['sh', 'run.sh']
    deploy:
      replicas: 2
      update_config:
        parallelism: 1
        delay: 10s
        failure_action: rollback
        order: start-first
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: '5'

  front:
    image: sneaxiii/mawster-front:latest
    networks:
      - internal
      - traefik-public
    environment:
      NEXTAUTH_URL: https://www.mawster.app
      NEXTAUTH_URL_INTERNAL: http://front:3000
      NEXT_PUBLIC_API_CLIENT_HOST: www.mawster.app
    secrets:
      - mawster_nextauth_secret
      - mawster_discord_client_id
      - mawster_discord_client_secret
      - mawster_google_client_id
      - mawster_google_client_secret
    command: ['sh', 'run.sh']
    deploy:
      replicas: 2
      update_config:
        parallelism: 1
        delay: 10s
        failure_action: rollback
        order: start-first
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
      labels:
        - traefik.enable=true
        - traefik.http.routers.front.rule=Host(`www.mawster.app`)
        - traefik.http.routers.front.entrypoints=websecure
        - traefik.http.routers.front.tls.certresolver=letsencrypt
        - traefik.http.routers.front.service=front
        - traefik.http.services.front.loadbalancer.server.port=3000
        - traefik.http.routers.front.middlewares=security-headers
        - traefik.http.middlewares.security-headers.headers.frameDeny=true
        - traefik.http.middlewares.security-headers.headers.contentTypeNosniff=true
        - traefik.http.middlewares.security-headers.headers.referrerPolicy=strict-origin-when-cross-origin
        - traefik.http.middlewares.security-headers.headers.permissionsPolicy=camera=(),microphone=(),geolocation=(),payment=(),usb=(),accelerometer=()
        - traefik.http.middlewares.security-headers.headers.customResponseHeaders.Server=
        - traefik.http.routers.apex-redirect.rule=Host(`mawster.app`)
        - traefik.http.routers.apex-redirect.entrypoints=websecure
        - traefik.http.routers.apex-redirect.tls.certresolver=letsencrypt
        - traefik.http.routers.apex-redirect.middlewares=apex-to-www
        - traefik.http.middlewares.apex-to-www.redirectregex.regex=^https://mawster.app/(.*)
        - traefik.http.middlewares.apex-to-www.redirectregex.replacement=https://www.mawster.app/$${1}
        - traefik.http.middlewares.apex-to-www.redirectregex.permanent=true
        - traefik.docker.network=traefik-public
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: '5'

  static:
    image: sneaxiii/mawster-static:latest
    networks:
      - traefik-public
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
      labels:
        - traefik.enable=true
        - traefik.http.routers.static.rule=Host(`www.mawster.app`) && PathPrefix(`/static/`)
        - traefik.http.routers.static.entrypoints=websecure
        - traefik.http.routers.static.tls.certresolver=letsencrypt
        - traefik.http.routers.static.service=static
        - traefik.http.services.static.loadbalancer.server.port=80
        - traefik.docker.network=traefik-public
    logging:
      driver: json-file
      options:
        max-size: 5m
        max-file: '3'

  backup:
    image: sneaxiii/mawster-backup:latest
    networks:
      - internal
    environment:
      TZ: Europe/Paris
      MARIADB_USER: mawster
      MARIADB_DATABASE: mawster
      MARIADB_PORT: '3306'
      BACKUP_INTERVAL: '7200'
    secrets:
      - mawster_db_root_password
      - mawster_rclone_conf
    volumes:
      - type: bind
        source: /home/mawster/Mawster/backups
        target: /backups
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.role == manager
      restart_policy:
        condition: on-failure
    logging:
      driver: json-file
      options:
        max-size: 5m
        max-file: '3'

  # --- Vision stack: broker + object store + the private ONNX worker ----------
  # Internal network only (never traefik-public): the queue and the store are
  # reachable by the API and the worker, never from the web.
  rabbitmq:
    image: rabbitmq:3.13-management
    hostname: rabbitmq  # stable node name so the mnesia dir survives restarts
    networks:
      - internal
    environment:
      RABBITMQ_DEFAULT_USER: mawster
    secrets:
      - mawster_rabbitmq_pass
    entrypoint:
      - /bin/sh
      - -c
      - export RABBITMQ_DEFAULT_PASS="$$(cat /run/secrets/mawster_rabbitmq_pass)"; exec docker-entrypoint.sh rabbitmq-server
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ['CMD', 'rabbitmq-diagnostics', '-q', 'check_port_connectivity']
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.role == manager
      restart_policy:
        condition: on-failure
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: '5'

  rustfs:
    image: rustfs/rustfs:latest
    networks:
      - internal
    # Web console only, served at http://localhost:9001/rustfs/console/ (the
    # port's root path answers as the S3 API, so `/` returns AccessDenied).
    # The S3 API port (9000) stays internal — api/worker reach it via
    # http://rustfs:9000 on the overlay network. Published in host mode on the
    # manager node. No Traefik route on purpose: keep it behind SSH/loopback.
    ports:
      - target: 9001
        published: 9001
        protocol: tcp
        mode: host
    environment:
      RUSTFS_CONSOLE_ENABLE: 'true'
      RUSTFS_CONSOLE_ADDRESS: ':9001'
      # rustfs's own entrypoint reads *_FILE creds natively
      # (validate_credential_source), so the keys stay in Swarm secret files and
      # never appear in the committed stack or `docker service inspect`.
      RUSTFS_ACCESS_KEY_FILE: /run/secrets/mawster_rustfs_access_key
      RUSTFS_SECRET_KEY_FILE: /run/secrets/mawster_rustfs_secret_key
    secrets:
      - mawster_rustfs_access_key
      - mawster_rustfs_secret_key
    volumes:
      - rustfs_data:/data
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.role == manager
      restart_policy:
        condition: on-failure
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: '5'

  # One-shot: create the buckets + the imports/ retention rule, then exit. Swarm
  # keeps re-running condition:none tasks off; it converges once rustfs is up.
  rustfs-init:
    image: amazon/aws-cli:latest
    networks:
      - internal
    secrets:
      - mawster_rustfs_access_key
      - mawster_rustfs_secret_key
    environment:
      AWS_DEFAULT_REGION: us-east-1
      # Must equal SECRET.VISION_RETENTION_DAYS (api/src/security/secrets.py):
      # a mismatch offers imports whose images are already purged.
      VISION_RETENTION_DAYS: '7'
    entrypoint:
      - sh
      - -c
      - |
        export AWS_ACCESS_KEY_ID="$$(cat /run/secrets/mawster_rustfs_access_key)"
        export AWS_SECRET_ACCESS_KEY="$$(cat /run/secrets/mawster_rustfs_secret_key)"
        until aws --endpoint-url http://rustfs:9000 s3 ls > /dev/null 2>&1; do
          echo "waiting for rustfs..."; sleep 2;
        done
        aws --endpoint-url http://rustfs:9000 s3 mb s3://vision  2>/dev/null || true
        aws --endpoint-url http://rustfs:9000 s3 mb s3://dataset 2>/dev/null || true
        aws --endpoint-url http://rustfs:9000 s3api put-bucket-lifecycle-configuration \
          --bucket vision \
          --lifecycle-configuration "{\"Rules\":[{\"ID\":\"expire-imports\",\"Status\":\"Enabled\",\"Filter\":{\"Prefix\":\"imports/\"},\"Expiration\":{\"Days\":$${VISION_RETENTION_DAYS}}}]}"
    deploy:
      replicas: 1
      restart_policy:
        condition: none
    logging:
      driver: json-file
      options:
        max-size: 5m
        max-file: '3'

  # The private, torch-free ONNX worker. Image lives in a PRIVATE registry repo
  # (built + pushed by mcoc-vision's own CI), so the worker source never leaks.
  vision-worker:
    image: sneaxiii/mawster-vision-worker:latest
    networks:
      - internal
    environment:
      RUSTFS_ENDPOINT: http://rustfs:9000
      RUSTFS_BUCKET_VISION: vision
      MCOC_DEVICE: cpu
    secrets:
      - mawster_rabbitmq_pass
      - mawster_rustfs_access_key
      - mawster_rustfs_secret_key
    # The image's worker/entrypoint.sh reads these secrets from /run/secrets and
    # exports RABBITMQ_URL / RUSTFS_* before starting the worker.
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
        delay: 5s
      resources:
        reservations:
          memory: 2G
        limits:
          cpus: '1.5'
          memory: 4G
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: '5'

volumes:
  data_db:
  traefik_data:
  api_logs:
  rabbitmq_data:
  rustfs_data:
