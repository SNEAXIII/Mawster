networks:
  obs:
    external: true
  traefik-public:
    external: true
  internal:
    external: true

services:
  prometheus:
    image: prom/prometheus:latest
    networks:
      - obs
      - traefik-public
      - internal
    volumes:
      - ./obs/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --storage.tsdb.retention.time=15d
    deploy:
      placement:
        constraints:
          - node.role == manager
      restart_policy:
        condition: on-failure

  loki:
    image: grafana/loki:latest
    networks:
      - obs
    volumes:
      - ./obs/loki/loki-config.yaml:/etc/loki/loki-config.yaml:ro
      - loki_data:/loki
    command: -config.file=/etc/loki/loki-config.yaml
    deploy:
      placement:
        constraints:
          - node.role == manager
      restart_policy:
        condition: on-failure

  promtail:
    image: grafana/promtail:latest
    networks:
      - obs
    volumes:
      - ./obs/promtail/promtail-config.yaml:/etc/promtail/promtail-config.yaml:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
    command: -config.file=/etc/promtail/promtail-config.yaml
    deploy:
      mode: global
      restart_policy:
        condition: on-failure

  grafana:
    image: grafana/grafana:latest
    networks:
      - obs
    ports:
      - target: 4500
        published: 4500
        protocol: tcp
        mode: host
    volumes:
      - grafana_data:/var/lib/grafana
      - ./obs/grafana/provisioning:/etc/grafana/provisioning:ro
    environment:
      GF_SERVER_HTTP_PORT: "4500"
      GF_AUTH_ANONYMOUS_ENABLED: "false"
    deploy:
      placement:
        constraints:
          - node.role == manager
      restart_policy:
        condition: on-failure

volumes:
  prometheus_data:
  loki_data:
  grafana_data:
